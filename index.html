<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link id="fav" rel="shortcut icon" type="image/png" href="https://www.google.com/favicon.ico">
    <style>
        :root {
            --theme-bg: #0b0b18;
            --theme-accent: #7c3aed;
            --theme-accent-2: #4f46e5;
            --theme-glow-1: rgba(124,58,237,0.12);
            --theme-glow-2: rgba(79,70,229,0.08);
            --theme-muted: #8078a8;
            --theme-muted-2: #6058a0;
            --theme-accent-10: rgba(124,58,237,0.1);
            --theme-accent-40: rgba(124,58,237,0.4);
            --theme-accent-6: rgba(124,58,237,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background: var(--theme-bg); color: #e5e3ff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* --- DECOY --- */
        #decoy { text-align: center; }
        .n { font-size: 90px; font-weight: 700; color: #1a1a2e; }
        .decoy-p { color: #4a4070; font-size: 14px; margin-top: 5px; }

        /* --- GLOWING LOGIN --- */
        #login-overlay {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: radial-gradient(ellipse at 20% 50%, var(--theme-glow-1) 0%, transparent 60%), 
                        radial-gradient(ellipse at 80% 20%, var(--theme-glow-2) 0%, transparent 50%), var(--theme-bg);
            flex-direction: column; align-items: center; justify-content: center;
        }

        .login-card {
            width: 100%; max-width: 380px; padding: 40px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--theme-accent-10);
            backdrop-filter: blur(20px);
            text-align: center;
        }

        .login-card h1 { font-size: 24px; margin-bottom: 8px; letter-spacing: -0.5px; }
        .login-card p { font-size: 13px; color: var(--theme-muted-2); margin-bottom: 24px; }

        input, textarea {
            width: 100%; padding: 12px 14px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #e5e3ff; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--theme-accent-40); background: var(--theme-accent-6); }

        .submit-btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2));
            color: white; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .submit-btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* --- PORTAL UI --- */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--theme-bg); z-index: 999; }
        #nav { 
            height: 60px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; padding: 0 20px; gap: 8px;
        }
        .nav-btn {
            padding: 8px 14px; border-radius: 8px; border: 1px solid transparent;
            background: transparent; color: var(--theme-muted); cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .nav-btn.on { background: var(--theme-accent-10); color: var(--theme-accent); border-color: var(--theme-accent-40); }
        .nav-btn:hover:not(.on) { background: rgba(255,255,255,0.05); color: #fff; }

        #body-content { flex: 1; overflow: hidden; position: relative; }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; }
        .view.on { display: flex; }

        /* --- TOOLS --- */
        iframe { width: 100%; height: 100%; border: none; }
        #html-editor-container { display: flex; flex-direction: row; height: 100%; }
        #code-input { width: 50%; height: 100%; background: #070714; color: #00ff88; font-family: monospace; padding: 20px; border-right: 1px solid #1e1e30; outline: none; resize: none; }
        #code-preview { width: 50%; height: 100%; background: white; }
    </style>
</head>
<body>

    <div id="decoy">
        <div class="n">404</div>
        <p class="decoy-p">The requested URL was not found on this server.</p>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 id="auth-title">System Login</h1>
            <p id="auth-subtitle">Encrypted gateway access required.</p>
            
            <div id="login-form">
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="pass" placeholder="Password">
                <button class="submit-btn" id="login-action">Sign In</button>
                <button class="submit-btn" style="background:none; color:var(--theme-muted); margin-top:10px;" onclick="toggleView(true)">Create Account</button>
            </div>

            <div id="request-form" style="display:none;">
                <input type="email" id="req-email" placeholder="Your Email">
                <input type="password" id="req-pass" placeholder="Desired Password">
                <textarea id="req-note" placeholder="Optional: 'Hey it's John from school'"></textarea>
                <button class="submit-btn" id="req-action" style="background:var(--theme-accent-2)">Request Access</button>
                <button class="submit-btn" style="background:none; color:var(--theme-muted); margin-top:10px;" onclick="toggleView(false)">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <div style="font-weight: 800; color: var(--theme-accent); margin-right: 15px;">M-TOOL</div>
            <button class="nav-btn on" onclick="showView('home', this)">Home</button>
            <button class="nav-btn" onclick="showView('games', this)">Games</button>
            <button class="nav-btn" onclick="showView('ixl', this)">IXL Math</button>
            <button class="nav-btn" onclick="showView('editor', this)">HTML Editor</button>
            <button class="nav-btn" onclick="showView('translate', this)">Translate</button>
            <div style="flex:1"></div>
            <div id="clock" style="font-family: monospace; color: var(--theme-muted-2); font-size: 13px;">00:00</div>
        </div>

        <div id="body-content">
            <div class="view on" id="view-home" style="padding: 50px;">
                <h1 style="font-size: 40px; margin-bottom: 10px;">Welcome, Agent.</h1>
                <p style="color: var(--theme-muted);">All modules loaded and secured.</p>
            </div>

            <div class="view" id="view-games">
                <iframe src="https://calcsolver.github.io/"></iframe>
            </div>

            <div class="view" id="view-ixl">
                <div style="padding: 10px; background: #12122a; display: flex; gap: 10px;">
                    <button class="nav-btn" onclick="openBlob('https://ixlmath.nwpa.com.au/')">Launch IXL (Unblocked Tab)</button>
                </div>
                <iframe id="ixl-frame"></iframe>
            </div>

            <div class="view" id="view-editor">
                <div id="html-editor-container">
                    <textarea id="code-input" placeholder="" oninput="updatePreview()"><h1>Hello World</h1></textarea>
                    <iframe id="code-preview"></iframe>
                </div>
            </div>

            <div class="view" id="view-translate">
                <iframe src="https://translate.google.com/?sl=auto&tl=en&op=translate"></iframe>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Login
        document.getElementById('login-action').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p)
                .then(() => { 
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('portal').style.display = 'flex';
                })
                .catch(() => alert("Get Access"));
        };

        // Request Access
        document.getElementById('req-action').onclick = async () => {
            await addDoc(collection(db, "requests"), {
                email: document.getElementById('req-email').value,
                password: document.getElementById('req-pass').value,
                note: document.getElementById('req-note').value,
                date: new Date()
            });
            alert("Request sent successfully!");
            location.reload();
        };
    </script>

    <script>
        // UI Logic
        function toggleView(isRequest) {
            document.getElementById('login-form').style.display = isRequest ? 'none' : 'block';
            document.getElementById('request-form').style.display = isRequest ? 'block' : 'none';
            document.getElementById('auth-title').innerText = isRequest ? "Create Account" : "System Login";
        }

        document.onkeydown = (e) => {
            if(e.ctrlKey && e.key === 'x') {
                document.getElementById('decoy').style.display = 'none';
                document.getElementById('login-overlay').style.display = 'flex';
            }
        };

        function showView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('view-' + id).classList.add('on');
            btn.classList.add('on');
            if(id === 'ixl') document.getElementById('ixl-frame').src = "https://ixlmath.nwpa.com.au/";
        }

        // HTML Editor Preview
        function updatePreview() {
            const code = document.getElementById('code-input').value;
            const preview = document.getElementById('code-preview').contentWindow.document;
            preview.open();
            preview.write(code);
            preview.close();
        }

        // Clock
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // Blob Bypass
        function openBlob(url) {
            var win = window.open();
            var frame = win.document.createElement('iframe');
            frame.style.width = "100%"; frame.style.height = "100%"; frame.style.border = "none";
            frame.src = url;
            win.document.body.appendChild(frame);
        }
    </script>
</body>
</html>
