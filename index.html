<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link id="fav" rel="shortcut icon" type="image/png" href="https://www.google.com/favicon.ico">
    <style>
        /* --- CORE STYLES --- */
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#fff;font-family:sans-serif;color:#555;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
        
        /* Decoy 404 */
        .n{font-size:90px;font-weight:700;color:#e0e0e0}
        .decoy-p{font-size:14px;color:#999;margin-top:6px; text-align:center;}
        small{font-size:11px;color:#ccc;font-family:monospace;display:block;margin-top:20px; text-align:center;}

        /* Login Overlay */
        #login-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #07090f;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .login-card {
            background: #0e1117;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #1e2736;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card h2 { margin-bottom: 20px; color: #00d4ff; font-size: 18px; letter-spacing: 1px; }
        .login-card input, .login-card textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #07090f;
            border: 1px solid #253044;
            color: white;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }
        .login-card textarea { height: 80px; resize: none; font-family: sans-serif; }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            border: none;
            color: black;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-card button:hover { opacity: 0.8; transform: translateY(-1px); }
        .switch-link { font-size: 11px; margin-top: 15px; color: #8899bb; cursor: pointer; text-decoration: underline; }

        /* --- PORTAL STYLES (Your Original) --- */
        #portal{display:none;position:fixed;inset:0;z-index:999;flex-direction:column;background:#07090f;color:#e8eef8;font-family:'Segoe UI',sans-serif}
        #nav{height:50px;background:#0d1117;border-bottom:1px solid #1e2736;display:flex;align-items:center;padding:0 12px;gap:4px;flex-shrink:0}
        .brand{font-family:monospace;font-size:13px;font-weight:700;color:#00d4ff;letter-spacing:2px;margin-right:6px}
        .sep{width:1px;height:22px;background:#253044;margin:0 4px}
        .sp{flex:1}
        .nb{font-size:12px;font-weight:600;padding:0 11px;height:30px;border-radius:6px;border:1px solid transparent;background:transparent;color:#8899bb;cursor:pointer;transition:.15s;white-space:nowrap}
        .nb:hover{background:#151c26;color:#e8eef8;border-color:#253044}
        .nb.on{background:rgba(0,212,255,.1);color:#00d4ff;border-color:rgba(0,212,255,.3)}
        #clock{font-family:monospace;font-size:12px;color:#8899bb;padding:4px 10px;background:#0e1117;border:1px solid #1e2736;border-radius:6px}
        #body{flex:1;overflow:hidden;display:flex;flex-direction:column}
        .pn{display:none;flex:1;flex-direction:column;overflow:hidden; padding: 40px;}
        .pn.on{display:flex}
        .hero h1{font-size:48px;font-weight:900;background:linear-gradient(135deg,#e8eef8,#00d4ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        
        /* Toast Notification */
        #tc{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:10001;}
        .toast{background:#151c26;border:1px solid #253044;color:#e8eef8;padding:9px 18px;border-radius:8px;font-size:12px;}
    </style>
</head>
<body>

<div id="decoy">
    <div class="n">404</div>
    <p class="decoy-p">Page not found.</p>
    <small>nginx/1.24.0</small>
</div>

<div id="login-overlay">
    <div class="login-card">
        <h2 id="auth-title">Authorized Access</h2>
        
        <div id="login-fields">
            <input type="email" id="fb-email" placeholder="Email Address">
            <input type="password" id="fb-pass" placeholder="Password">
            <button id="fb-login-btn">Log In</button>
            <p class="switch-link" onclick="toggleAuthMode()">Request Access</p>
        </div>

        <div id="request-fields" style="display:none;">
            <input type="email" id="req-email" placeholder="Your Email">
            <input type="password" id="req-pass" placeholder="Desired Password">
            <textarea id="req-note" placeholder="Optional Note: 'Hey it's John from school...'"></textarea>
            <button id="fb-req-btn" style="background:#00ff88; color:#000;">Send Request</button>
            <p class="switch-link" onclick="toggleAuthMode()">Back to Login</p>
        </div>
    </div>
</div>

<div id="portal">
    <div id="nav">
        <span class="brand">WS://</span>
        <div class="sep"></div>
        <button class="nb on" onclick="go('home')">🏠 Home</button>
        <div class="sp"></div>
        <div id="clock">00:00:00</div>
    </div>

    <div id="body">
        <div class="pn on" id="pn-home">
            <div class="hero">
                <h1>Welcome, Agent.</h1>
                <p style="color:#8899bb; margin-top:10px;">Your private tools are now unlocked.</p>
            </div>
            </div>
    </div>
</div>

<div id="tc"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
        authDomain: "testing-12bc9.firebaseapp.com",
        projectId: "testing-12bc9",
        storageBucket: "testing-12bc9.firebasestorage.app",
        messagingSenderId: "626782607651",
        appId: "1:626782607651:web:c5980863cef82d904a5496",
        measurementId: "G-B5RQYLYCQ9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Toggle Login/Request
    window.toggleAuthMode = () => {
        const isLogin = document.getElementById('login-fields').style.display !== 'none';
        document.getElementById('login-fields').style.display = isLogin ? 'none' : 'block';
        document.getElementById('request-fields').style.display = isLogin ? 'block' : 'none';
        document.getElementById('auth-title').innerText = isLogin ? "Request Access" : "Authorized Access";
    };

    // Login Logic
    document.getElementById('fb-login-btn').addEventListener('click', () => {
        const email = document.getElementById('fb-email').value;
        const pass = document.getElementById('fb-pass').value;

        signInWithEmailAndPassword(auth, email, pass)
            .then(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                showToast("Access Granted");
            })
            .catch(() => {
                alert("Get Access"); // Custom error message as requested
            });
    });

    // Request Logic (Sends to Firestore)
    document.getElementById('fb-req-btn').addEventListener('click', async () => {
        const email = document.getElementById('req-email').value;
        const pass = document.getElementById('req-pass').value;
        const note = document.getElementById('req-note').value;

        if(!email || !pass) return alert("Fill in email and password");

        try {
            await addDoc(collection(db, "requests"), {
                email: email,
                requestedPassword: pass,
                note: note,
                time: new Date()
            });
            alert("Request sent! I'll verify you soon.");
            toggleAuthMode();
        } catch (e) {
            alert("Error: " + e.message);
        }
    });

    function showToast(m) {
        const tc = document.getElementById('tc');
        const t = document.createElement('div');
        t.className = 'toast'; t.innerText = m;
        tc.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>

<script>
    // Secret Trigger: Ctrl + X
    document.onkeydown = function(e) {
        if(e.ctrlKey && e.key === 'x') {
            e.preventDefault();
            document.getElementById('decoy').style.display = 'none';
            document.getElementById('login-overlay').style.display = 'flex';
        }
    };

    // Simple Navigation
    function go(id) {
        document.querySelectorAll('.pn').forEach(p => p.classList.remove('on'));
        document.getElementById('pn-' + id).classList.add('on');
    }

    // Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
