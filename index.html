<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <link id="fav" rel="shortcut icon" type="image/png" href="https://www.google.com/favicon.ico">
    <style>
        /* --- CORE STYLES --- */
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#fff;font-family:sans-serif;color:#555;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
        .n{font-size:90px;font-weight:700;color:#e0e0e0}
        p{font-size:14px;color:#999;margin-top:6px}
        small{font-size:11px;color:#ccc;font-family:monospace;display:block;margin-top:20px}

        /* Login Overlay */
        #login-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: #07090f; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-card { background: #0e1117; padding: 30px; border-radius: 12px; border: 1px solid #1e2736; width: 320px; text-align: center; }
        .login-card input, .login-card textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #07090f; border: 1px solid #253044; color: white; border-radius: 6px; outline: none; }
        .login-card button { width: 100%; padding: 12px; background: #00d4ff; border: none; font-weight: 700; border-radius: 6px; cursor: pointer; }

        /* Portal Styles */
        #portal{display:none;position:fixed;inset:0;z-index:999;flex-direction:column;background:#07090f;color:#e8eef8;font-family:'Segoe UI',sans-serif}
        #nav{height:50px;background:#0d1117;border-bottom:1px solid #1e2736;display:flex;align-items:center;padding:0 12px;gap:4px;flex-shrink:0}
        .brand{font-family:monospace;font-size:13px;font-weight:700;color:#00d4ff;letter-spacing:2px;margin-right:6px}
        .nb{font-size:12px;font-weight:600;padding:0 11px;height:30px;border-radius:6px;border:1px solid transparent;background:transparent;color:#8899bb;cursor:pointer;transition:.15s;}
        .nb.on{background:rgba(0,212,255,.1);color:#00d4ff;border-color:rgba(0,212,255,.3)}
        .sp{flex:1}
        #body{flex:1;overflow:hidden;display:flex;flex-direction:column}
        .pn{display:none;flex:1;flex-direction:column;overflow:hidden}
        .pn.on{display:flex}
        iframe.full{flex:1;border:none;width:100%;height:100%}
        .iframe-bar{height:40px;background:#0d1117;border-bottom:1px solid #1e2736;display:flex;align-items:center;padding:0 10px;gap:6px;}
        .blob-btn{font-size:11px;font-weight:700;padding:0 12px;height:24px;border-radius:5px;border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,.08);color:#00d4ff;cursor:pointer;}
        .hint{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:40px}
        #clock{font-family:monospace;font-size:12px;color:#8899bb;padding:4px 10px;}
    </style>
</head>
<body>

    <div id="decoy" style="text-align:center">
        <div class="n">404</div>
        <p>Page not found.</p>
        <small>nginx/1.24.0</small>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 id="auth-title" style="margin-bottom:15px; color:#00d4ff;">Authorized Access</h2>
            <div id="login-fields">
                <input type="email" id="fb-email" placeholder="Email">
                <input type="password" id="fb-pass" placeholder="Password">
                <button id="fb-login-btn">Log In</button>
                <p style="font-size:11px; margin-top:15px; color:#8899bb; cursor:pointer;" onclick="toggleAuthMode()">Request Access</p>
            </div>
            <div id="request-fields" style="display:none;">
                <input type="email" id="req-email" placeholder="Your Email">
                <input type="password" id="req-pass" placeholder="Desired Password">
                <textarea id="req-note" placeholder="Note (Who are you?)"></textarea>
                <button id="fb-req-btn" style="background:#00ff88; color:#000;">Send Request</button>
                <p style="font-size:11px; margin-top:15px; color:#8899bb; cursor:pointer;" onclick="toggleAuthMode()">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <span class="brand">WS://</span>
            <button class="nb on" id="nb-home" onclick="go('home')">🏠 Home</button>
            <button class="nb" id="nb-games" onclick="go('games')">🎮 Games</button>
            <button class="nb" id="nb-video" onclick="go('video')">🎬 Video</button>
            <div class="sp"></div>
            <div id="clock">--:--:--</div>
        </div>

        <div id="body">
            <div class="pn on" id="pn-home" style="padding:40px;">
                <h1>Private Portal</h1>
                <p>Welcome back. All systems online.</p>
            </div>

            <div class="pn" id="pn-games">
                <div class="iframe-bar">
                    <span style="font-size:11px; color:#4a5568;">https://calcsolver.github.io/</span>
                    <button class="blob-btn" onclick="openBlob('https://calcsolver.github.io/')">🌐 Open as Blob</button>
                </div>
                <iframe class="full" id="games-f"></iframe>
            </div>

            <div class="pn" id="pn-video">
                <div class="iframe-bar">
                    <span style="font-size:11px; color:#4a5568;">https://www.veed.io</span>
                </div>
                <div class="hint">
                    <div style="font-size:40px;">🎬</div>
                    <h2>Veed.io</h2>
                    <p>Veed blocks iframes. You must open it as a Blob tab.</p>
                    <button class="blob-btn" style="height:35px; font-size:14px;" onclick="openBlob('https://www.veed.io')">🌐 Open in New Disguised Tab</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496",
            measurementId: "G-B5RQYLYCQ9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Login Logic
        document.getElementById('fb-login-btn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('fb-email').value, document.getElementById('fb-pass').value)
                .then(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    window.openPortal();
                })
                .catch(() => alert("Get Access"));
        });

        // Request Logic
        document.getElementById('fb-req-btn').addEventListener('click', async () => {
            try {
                await addDoc(collection(db, "requests"), {
                    email: document.getElementById('req-email').value,
                    pass: document.getElementById('req-pass').value,
                    note: document.getElementById('req-note').value,
                    time: new Date()
                });
                alert("Request sent!");
                window.toggleAuthMode();
            } catch (e) { alert("Error: " + e.message); }
        });
    </script>

    <script>
        var framesReady = false;

        window.toggleAuthMode = () => {
            const login = document.getElementById('login-fields');
            const request = document.getElementById('request-fields');
            login.style.display = (login.style.display === 'none') ? 'block' : 'none';
            request.style.display = (request.style.display === 'none') ? 'block' : 'none';
        };

        document.onkeydown = (e) => {
            if(e.ctrlKey && e.key === 'x') {
                e.preventDefault();
                document.getElementById('decoy').style.display = 'none';
                document.getElementById('login-overlay').style.display = 'flex';
            }
        };

        window.openPortal = () => {
            document.getElementById('portal').style.display = 'flex';
            if(!framesReady) {
                document.getElementById('games-f').src = "https://calcsolver.github.io/";
                framesReady = true;
            }
        };

        function go(id) {
            document.querySelectorAll('.pn').forEach(p => p.classList.remove('on'));
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
            document.getElementById('pn-' + id).classList.add('on');
            document.getElementById('nb-' + id).classList.add('on');
        }

        function openBlob(url) {
            var html = `<!DOCTYPE html><html><head><title>Google</title><style>body,iframe{margin:0;height:100vh;width:100vw;border:none;overflow:hidden}</style></head><body><iframe src="${url}"></iframe></body></html>`;
            window.open(URL.createObjectURL(new Blob([html], {type: 'text/html'})), '_blank');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
